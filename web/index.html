<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NOVA WALL — Command Center</title>
<style>
:root{
  --bg:#06080d; --panel:#0b1120; --panel2:#0e1526; --border:#1b2740; --border2:#25324f;
  --txt:#c9d6ee; --dim:#6b7a9c; --dimmer:#48566f;
  --cyan:#22d3ee; --amber:#f5b301; --green:#34d399; --red:#f43f5e; --violet:#a78bfa; --pink:#f472b6;
  --glow:0 0 0 1px rgba(34,211,238,.15), 0 8px 30px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow:hidden}
body{background:
  radial-gradient(1200px 600px at 80% -10%, rgba(34,211,238,.06), transparent 60%),
  radial-gradient(900px 500px at 10% 110%, rgba(167,139,250,.05), transparent 60%),
  linear-gradient(#06080d,#05070c);}
.mono{font-family:"SF Mono","JetBrains Mono",ui-monospace,Menlo,monospace}

/* ---- top bar ---- */
header{display:flex;align-items:center;gap:14px;padding:10px 16px;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(13,18,32,.9),rgba(8,11,20,.6));backdrop-filter:blur(8px);
  position:relative;z-index:40}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.5px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--green);
  box-shadow:0 0 12px var(--green);animation:pulse 2s infinite}
.brand small{color:var(--dim);font-weight:500;letter-spacing:.3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.stat{display:flex;gap:16px;margin-left:6px;color:var(--dim);font-size:12px}
.stat b{color:var(--txt)}
.spacer{flex:1}
.ctrl{display:flex;align-items:center;gap:8px}
button,select,input{font:inherit;color:var(--txt);background:var(--panel2);border:1px solid var(--border2);
  border-radius:9px;padding:7px 11px;cursor:pointer;transition:.15s}
button:hover,select:hover{border-color:var(--cyan);box-shadow:0 0 0 1px rgba(34,211,238,.2)}
button.on{background:rgba(34,211,238,.14);border-color:var(--cyan);color:#dffaff}
button.primary{background:linear-gradient(180deg,#12a3bd,#0c7f96);border-color:#1fb6d1;color:#eafcff;font-weight:600}
.seg{display:flex;background:var(--panel2);border:1px solid var(--border2);border-radius:9px;overflow:hidden}
.seg button{border:0;border-radius:0;background:transparent;padding:7px 10px}
.seg button.on{background:rgba(34,211,238,.16)}

/* ---- wall grid ---- */
#stage{position:absolute;inset:56px 0 0 0;overflow:auto}
#wall{display:grid;gap:12px;padding:14px;min-height:100%;
  grid-template-columns:repeat(var(--cols,3),1fr);align-content:start}
.tile{position:relative;background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;
  min-height:210px;box-shadow:var(--glow);transition:.18s}
.tile:hover{border-color:var(--border2);transform:translateY(-1px)}
.tile.idle{opacity:.62;filter:saturate(.6)}
.tile.dead{opacity:.4}
.tile.sel{border-color:var(--amber);box-shadow:0 0 0 2px rgba(245,179,1,.35),0 8px 30px rgba(0,0,0,.6)}
.tile.linksrc{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(34,211,238,.4)}
.tile.managed{border-color:#22406a}
.thead{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.25)}
.led{width:8px;height:8px;border-radius:50%;background:var(--dimmer);flex:none}
.led.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.8s infinite}
.led.hot{background:var(--amber);box-shadow:0 0 8px var(--amber)}
.tid{font-size:11px;color:var(--dim);font-weight:600}
.proj{font-size:12px;font-weight:700;color:#e6eefc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--border2);color:var(--dim);white-space:nowrap}
.badge.model{font-weight:700}
.b-Opus{color:#ffe9a8;border-color:#5a4a12;background:rgba(245,179,1,.1)}
.b-Sonnet{color:#bff3fb;border-color:#12505a;background:rgba(34,211,238,.1)}
.b-Fable{color:#e5dcff;border-color:#3d2f6a;background:rgba(167,139,250,.12)}
.b-Grok{color:#ffd7ec;border-color:#6a2f52;background:rgba(244,114,182,.12)}
.b-GLM,.b-Haiku{color:#c7f6d9;border-color:#1c5a3a;background:rgba(52,211,153,.1)}
.b-client{color:#ffd7ec;border-color:#5a2f4a;background:rgba(244,114,182,.08)}
.tbody{flex:1;padding:10px 11px;overflow:hidden;position:relative}
.goal{font-size:12.5px;line-height:1.4;color:#d8e2f4;max-height:70px;overflow:hidden}
.feed{margin-top:8px}
.chip{display:inline-block;font-size:10.5px;padding:2px 7px;margin:2px 3px 0 0;border-radius:6px;
  background:rgba(52,211,153,.08);border:1px solid #1c5a3a;color:#a9edc7}
.chip.blk{background:rgba(244,63,94,.08);border-color:#5a1c2a;color:#ffb3c0}
pre.cam{margin:0;font-size:10.5px;line-height:1.35;color:#8affc0;background:#03060a;
  border-radius:8px;padding:8px;max-height:120px;overflow:hidden;white-space:pre-wrap;
  border:1px solid #10251a;text-shadow:0 0 4px rgba(52,211,153,.25)}
.scan{position:absolute;inset:0;pointer-events:none;background:
  repeating-linear-gradient(0deg,rgba(255,255,255,.015) 0 1px,transparent 1px 3px)}
.tfoot{display:flex;align-items:center;gap:6px;padding:7px 9px;border-top:1px solid var(--border);
  background:rgba(0,0,0,.28)}
.tfoot select{padding:4px 6px;font-size:11px;border-radius:7px;flex:1;min-width:0}
.icon{padding:5px 7px;font-size:12px;line-height:1;border-radius:7px}
.age{font-size:10px;color:var(--dimmer);margin-left:auto}

/* ---- arrows overlay ---- */
#arrows{position:absolute;inset:0;pointer-events:none;z-index:20}
#arrows path{pointer-events:stroke;cursor:pointer}

/* ---- port dots for linking ---- */
.tile .port{position:absolute;right:8px;top:8px;z-index:5}

/* ---- modal ---- */
.overlay{position:fixed;inset:0;background:rgba(3,5,10,.72);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:60}
.overlay.show{display:flex}
.modal{width:min(560px,92vw);background:linear-gradient(180deg,var(--panel),#0a0f1c);
  border:1px solid var(--border2);border-radius:18px;padding:20px;box-shadow:0 30px 80px rgba(0,0,0,.7)}
.modal h3{margin:0 0 14px;font-size:16px}
.modal label{display:block;font-size:12px;color:var(--dim);margin:12px 0 5px}
.modal input,.modal select{width:100%;padding:10px}
.modal .row{display:flex;gap:10px}
.modal .row>*{flex:1}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.hint{font-size:11px;color:var(--dimmer);margin-top:6px;line-height:1.4}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:80;
  background:#0d1526;border:1px solid var(--border2);padding:11px 18px;border-radius:12px;
  color:#dff;box-shadow:0 10px 40px rgba(0,0,0,.6);opacity:0;transition:.25s;font-size:13px}
.toast.show{opacity:1}
.empty{grid-column:1/-1;text-align:center;color:var(--dim);padding:60px}
/* link-type picker */
.picker{position:fixed;z-index:70;background:#0c1424;border:1px solid var(--border2);border-radius:12px;
  padding:6px;display:none;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.picker.show{display:block}
.picker button{display:flex;gap:10px;width:220px;text-align:left;background:transparent;border:0;padding:9px 10px;border-radius:8px}
.picker button:hover{background:rgba(34,211,238,.12)}
.picker b{font-size:12.5px}.picker span{font-size:11px;color:var(--dim)}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span>NOVA&nbsp;WALL <small>· command center</small></div>
  <div class="stat">
    <span><b id="n-live">0</b> live</span>
    <span><b id="n-tot">0</b> sessions</span>
    <span><b id="n-mgd">0</b> gérés</span>
  </div>
  <div class="spacer"></div>
  <div class="ctrl">
    <input id="filter" placeholder="filtrer (client, dossier…)" style="width:170px">
    <div class="seg" id="gridseg">
      <button data-c="2">2×2</button><button data-c="3" class="on">3×3</button>
      <button data-c="4">4×4</button><button data-c="5">5×</button>
    </div>
    <button id="btn-link" title="Mode liaison n8n">🔗 Liaisons</button>
    <button id="btn-fuse" title="Fusionner 2 sessions">⧉ Fusion</button>
    <button id="btn-new" class="primary">＋ Terminal</button>
    <button id="btn-pop" title="Détacher sur un 2ᵉ écran">⧉⧉</button>
  </div>
</header>

<div id="stage">
  <svg id="arrows"></svg>
  <div id="wall"></div>
</div>

<!-- new terminal modal -->
<div class="overlay" id="ov-new">
  <div class="modal">
    <h3>＋ Nouveau terminal géré</h3>
    <label>Nom</label><input id="nw-name" placeholder="ex: esther, patents, recherche">
    <div class="row">
      <div><label>Modèle / mode</label>
        <select id="nw-mode">
          <option value="opus">Opus 4.8 (défaut)</option>
          <option value="sonnet">Sonnet 5</option>
          <option value="fable">Fable 5</option>
          <option value="opus-dngrok">Opus + dnGrok (bridge)</option>
          <option value="fable-dngrok">Fable + dnGrok (bridge)</option>
          <option value="grok">Grok 4.5</option>
          <option value="grok-dngrok">Grok + dnGrok</option>
        </select></div>
      <div><label>Dossier de travail</label><input id="nw-cwd" placeholder="~ (défaut)"></div>
    </div>
    <div class="hint">Lancé en tmux (container caché, zéro vol de focus). Caméra live + injectable.
      Attache-toi dans un vrai terminal via <span class="mono">tmux attach -t nova-&lt;nom&gt;</span>.</div>
    <div class="actions"><button onclick="closeOv()">Annuler</button>
      <button class="primary" id="nw-go">Lancer</button></div>
  </div>
</div>

<!-- zoom modal -->
<div class="overlay" id="ov-zoom">
  <div class="modal" style="width:min(720px,94vw)">
    <h3 id="z-title">caméra</h3>
    <div id="z-body" class="mono" style="font-size:12px;max-height:52vh;overflow:auto"></div>
    <div style="margin-top:14px"><label style="font-size:12px;color:var(--dim)">Injecter dans cette session (si gérée)</label>
      <div class="row" style="margin-top:6px"><input id="z-inject" placeholder="message à injecter…" style="flex:3">
        <button class="primary" id="z-send" style="flex:1">Injecter</button></div></div>
    <div class="actions"><button onclick="closeOv()">Fermer</button></div>
  </div>
</div>

<div class="picker" id="picker">
  <button data-t="inject"><b>→ Injecter</b><span>pousser le contexte A vers B (1 sens)</span></button>
  <button data-t="bridge"><b>⇄ Bridge</b><span>relais bidirectionnel A↔B</span></button>
  <button data-t="learn"><b>🎓 Apprendre</b><span>échanger les leçons/techniques A↔B</span></button>
</div>

<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
let S={sessions:[],modes:{},links:[],cols:3,linkMode:false,fuseMode:false,
       sel:[],linkFrom:null,filter:"",pending:null};

function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2600);}
async function api(u,opt){const r=await fetch(u,opt);return r.json();}

async function load(){
  try{
    const d=await api("/api/sessions"); S.sessions=d.sessions; S.modes=d.modes;
    const lk=await api("/api/links"); S.links=lk.edges||[];
    render();
  }catch(e){console.error(e);}
}

function modelClass(m){for(const k of ["Opus","Sonnet","Fable","Grok","GLM","Haiku"])if((m||"").includes(k))return"b-"+k;return"";}
function fmtAge(s){if(s<60)return"à l'instant";if(s<3600)return Math.round(s/60)+"m";if(s<86400)return Math.round(s/3600)+"h";return"—";}
function visible(){const f=S.filter.toLowerCase();return S.sessions.filter(s=>!f||
  (s.project+" "+(s.clients||[]).join(" ")+" "+s.cwd+" "+s.goal+" "+s.model).toLowerCase().includes(f));}

function render(){
  document.documentElement.style.setProperty("--cols",S.cols);
  const wall=$("#wall"),list=visible();
  $("#n-live").textContent=S.sessions.filter(s=>s.live).length;
  $("#n-tot").textContent=S.sessions.length;
  $("#n-mgd").textContent=S.sessions.filter(s=>s.kind==="managed").length;
  wall.innerHTML="";
  if(!list.length){wall.innerHTML='<div class="empty">Aucune session. Clique ＋ Terminal pour en lancer une.</div>';drawArrows();return;}
  for(const s of list){
    const t=document.createElement("div");
    t.className="tile"+(s.live?"":" idle")+(s.dead?" dead":"")+(s.kind==="managed"?" managed":"")
      +(S.sel.includes(s.id)?" sel":"")+(S.linkFrom===s.id?" linksrc":"");
    t.dataset.id=s.id;
    const led=s.age_s<40?"led hot":(s.live?"led live":"led");
    const clients=(s.clients||[]).map(c=>`<span class="badge b-client">${c}</span>`).join("");
    let cam;
    if(s.kind==="managed"&&s.capture){
      cam=`<pre class="cam">${esc(s.capture).slice(-1400)||"(terminal vide)"}</pre>`;
    }else{
      const wins=(s.wins||[]).map(w=>`<span class="chip">✓ ${esc(w).slice(0,60)}</span>`).join("");
      const blk=(s.blockers||[]).map(w=>`<span class="chip blk">⚠ ${esc(w).slice(0,60)}</span>`).join("");
      cam=`<div class="goal">${esc(s.goal)||"<span style='color:var(--dimmer)'>—</span>"}</div>
           <div class="feed">${wins}${blk}</div>`;
    }
    const opts=Object.entries(S.modes).map(([k,v])=>`<option value="${k}" ${s.mode===k?"selected":""}>${v}</option>`).join("");
    t.innerHTML=`
      <div class="thead">
        <span class="${led}"></span>
        <span class="proj">${esc(s.project)}</span>
        <span class="tid mono">${esc(s.id)}</span>
        ${clients}
        <span class="spacer" style="flex:1"></span>
        <span class="badge model ${modelClass(s.model)}">${esc(s.model)}</span>
      </div>
      <div class="tbody">${cam}<div class="scan"></div></div>
      <div class="tfoot">
        <select class="modesel" title="mode (relance en ce mode)">${opts}</select>
        <button class="icon" data-act="zoom" title="agrandir la caméra">👁</button>
        ${s.kind==="managed"?`<button class="icon" data-act="attach" title="commande d'attache">⚡</button>
          <button class="icon" data-act="kill" title="fermer">✕</button>`:""}
        <span class="age mono">${fmtAge(s.age_s)}</span>
      </div>`;
    // interactions
    t.querySelector(".thead").onclick=()=>tileClick(s);
    t.querySelector(".tbody").onclick=()=>tileClick(s);
    t.querySelector('[data-act="zoom"]').onclick=e=>{e.stopPropagation();zoom(s);};
    const at=t.querySelector('[data-act="attach"]'); if(at)at.onclick=e=>{e.stopPropagation();
      navigator.clipboard?.writeText("tmux attach -t "+s.id);toast("Copié: tmux attach -t "+s.id);};
    const kb=t.querySelector('[data-act="kill"]'); if(kb)kb.onclick=async e=>{e.stopPropagation();
      if(confirm("Fermer "+s.id+" ?")){await api("/api/kill",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({target:s.id})});load();}};
    t.querySelector(".modesel").onclick=e=>e.stopPropagation();
    t.querySelector(".modesel").onchange=e=>changeMode(s,e.target.value);
    wall.appendChild(t);
  }
  drawArrows();
}
function esc(s){return (s??"").toString().replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function tileClick(s){
  if(S.linkMode){
    if(!S.linkFrom){S.linkFrom=s.id;toast("Source: "+s.id+" — clique la cible");render();}
    else if(S.linkFrom!==s.id){openPicker(S.linkFrom,s.id);}
    return;
  }
  if(S.fuseMode){
    if(S.sel.includes(s.id))S.sel=S.sel.filter(x=>x!==s.id);else S.sel.push(s.id);
    S.sel=S.sel.slice(-2);
    if(S.sel.length===2)doFuse();
    render();return;
  }
  zoom(s);
}

/* ---- link picker ---- */
function openPicker(from,to){
  S.pending={from,to};const p=$("#picker");
  p.style.left=Math.min(event.clientX,innerWidth-240)+"px";
  p.style.top=Math.min(event.clientY,innerHeight-140)+"px";p.classList.add("show");
}
$("#picker").querySelectorAll("button").forEach(b=>b.onclick=async()=>{
  const {from,to}=S.pending;const type=b.dataset.t;$("#picker").classList.remove("show");
  const r=await api("/api/link",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({from,to,type})});
  S.links.push(r.edge);S.linkFrom=null;render();
  toast("Liaison "+type+" créée — clique la flèche pour l'exécuter");
});
document.addEventListener("click",e=>{if(!e.target.closest("#picker")&&!e.target.closest(".tile"))$("#picker").classList.remove("show");});

/* ---- arrows ---- */
function tileRect(id){const el=$(`.tile[data-id="${CSS.escape(id)}"]`);if(!el)return null;
  const r=el.getBoundingClientRect(),st=$("#stage").getBoundingClientRect();
  return {x:r.left-st.left+$("#stage").scrollLeft,y:r.top-st.top+$("#stage").scrollTop,w:r.width,h:r.height};}
function drawArrows(){
  const svg=$("#arrows");svg.innerHTML=`<defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22d3ee"/></marker></defs>`;
  const st=$("#stage");svg.setAttribute("width",st.scrollWidth);svg.setAttribute("height",st.scrollHeight);
  const COL={inject:"#22d3ee",bridge:"#f5b301",learn:"#a78bfa"};
  for(const e of S.links){
    const a=tileRect(e.from),b=tileRect(e.to);if(!a||!b)continue;
    const x1=a.x+a.w/2,y1=a.y+a.h/2,x2=b.x+b.w/2,y2=b.y+b.h/2;
    const mx=(x1+x2)/2,my=(y1+y2)/2-40;
    const col=COL[e.type]||"#22d3ee";const two=e.type!=="inject";
    const p=document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d",`M${x1},${y1} Q${mx},${my} ${x2},${y2}`);
    p.setAttribute("fill","none");p.setAttribute("stroke",col);
    p.setAttribute("stroke-width","2.5");p.setAttribute("marker-end","url(#ah)");
    p.setAttribute("opacity",".85");p.style.filter=`drop-shadow(0 0 4px ${col})`;
    if(two)p.setAttribute("stroke-dasharray","2 6");
    p.onclick=ev=>{ev.stopPropagation();runOrDel(e);};
    svg.appendChild(p);
    const lbl=document.createElementNS("http://www.w3.org/2000/svg","text");
    lbl.setAttribute("x",mx);lbl.setAttribute("y",my+4);lbl.setAttribute("fill",col);
    lbl.setAttribute("font-size","11");lbl.setAttribute("text-anchor","middle");
    lbl.textContent=({inject:"→",bridge:"⇄",learn:"🎓⇄"})[e.type]||"→";
    svg.appendChild(lbl);
  }
}
async function runOrDel(e){
  if(confirm(`Liaison ${e.type} ${e.from}→${e.to}\n\nOK = exécuter (transférer le contexte maintenant)\nAnnuler = supprimer la liaison`)){
    const r=await api("/api/link/run",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(e)});
    toast(r.ok?("Transfert "+e.type+" exécuté"):"Échec transfert");
  }else{
    await api("/api/unlink",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:e.id})});
    S.links=S.links.filter(x=>x.id!==e.id);render();
  }
}

/* ---- zoom ---- */
async function zoom(s){
  $("#z-title").textContent=`caméra · ${s.id} · ${s.project}`;
  $("#z-body").innerHTML="chargement…";
  $("#ov-zoom").classList.add("show");
  const d=await api("/api/tile?id="+encodeURIComponent(s.id));
  let h="";
  if(d.capture!==undefined){h=`<pre class="cam" style="max-height:none">${esc(d.capture)||"(vide)"}</pre>`;}
  else if(d.tail){h=d.tail.map(r=>`<div style="margin:4px 0"><b style="color:${r.role==='assistant'?'#22d3ee':'#f5b301'}">${r.role}</b> ${esc(r.text)}</div>`).join("")||"(pas d'activité récente)";}
  else h="(pas de flux)";
  $("#z-body").innerHTML=h;
  $("#z-send").onclick=async()=>{
    const txt=$("#z-inject").value.trim();if(!txt)return;
    const r=await api("/api/inject",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({target:s.id,text:txt})});
    toast(r.ok?"Injecté ✓":(r.reason||"cible non injectable"));if(r.ok)$("#z-inject").value="";
  };
}

/* ---- mode change (relaunch managed / hint external) ---- */
async function changeMode(s,mode){
  if(s.kind!=="managed"){toast("Session externe : le mode se choisit à sa création. Crée un terminal géré pour ce contrôle.");render();return;}
  toast("Change de mode = relance "+s.id+" en "+S.modes[mode]);
  await api("/api/kill",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({target:s.id})});
  await api("/api/spawn",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:s.id.replace(/^nova-/,""),mode,cwd:s.cwd})});
  load();
}

/* ---- fusion ---- */
async function doFuse(){
  const [a,b]=S.sel;
  const name="fusion-"+a.replace(/^nova-/,"").slice(0,4)+"-"+b.replace(/^nova-/,"").slice(0,4);
  toast("Fusion "+a+" + "+b+" → nouveau terminal "+name);
  const sp=await api("/api/spawn",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,mode:"opus-dngrok",cwd:"~"})});
  if(sp.tmux){
    // injecte les deux contextes dans le nouveau
    for(const src of [a,b]){
      await api("/api/link/run",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({from:src,to:sp.tmux,type:"inject"})});
    }
    toast("Fusion créée : "+sp.tmux);
  }
  S.sel=[];S.fuseMode=false;$("#btn-fuse").classList.remove("on");load();
}

/* ---- toolbar ---- */
$("#gridseg").querySelectorAll("button").forEach(b=>b.onclick=()=>{
  $("#gridseg").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");S.cols=+b.dataset.c;render();});
$("#btn-link").onclick=e=>{S.linkMode=!S.linkMode;S.linkFrom=null;S.fuseMode=false;
  e.target.classList.toggle("on",S.linkMode);$("#btn-fuse").classList.remove("on");
  toast(S.linkMode?"Mode liaison ON — clique source puis cible":"Mode liaison OFF");render();};
$("#btn-fuse").onclick=e=>{S.fuseMode=!S.fuseMode;S.sel=[];S.linkMode=false;
  e.target.classList.toggle("on",S.fuseMode);$("#btn-link").classList.remove("on");
  toast(S.fuseMode?"Mode fusion — sélectionne 2 sessions":"Mode fusion OFF");render();};
$("#btn-new").onclick=()=>$("#ov-new").classList.add("show");
$("#nw-go").onclick=async()=>{
  const name=$("#nw-name").value.trim()||("t"+Date.now()%1000);
  const mode=$("#nw-mode").value;let cwd=$("#nw-cwd").value.trim();
  if(cwd.startsWith("~"))cwd=cwd.replace("~","");
  const r=await api("/api/spawn",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,mode,cwd:cwd||null})});
  closeOv();toast(r.ok?("Lancé "+r.tmux+" — "+r.attach):"Échec spawn");load();};
$("#btn-pop").onclick=()=>window.open(location.href,"novawall2","width=1200,height=800");
$("#filter").oninput=e=>{S.filter=e.target.value;render();};
window.closeOv=()=>$$(".overlay").forEach(o=>o.classList.remove("show"));
$$(".overlay").forEach(o=>o.onclick=e=>{if(e.target===o)closeOv();});
$("#stage").onscroll=drawArrows;window.onresize=drawArrows;

load();setInterval(load,4000);
</script>
</body>
